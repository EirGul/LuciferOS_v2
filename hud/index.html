<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LuciferOS HUD</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="shell">
    <section class="panel header-panel">
      <p class="eyebrow">LuciferOS</p>
      <h1>HUD Preview</h1>
      <p class="subtitle">Static HUD skeleton connected to the local LuciferOS API.</p>
    </section>

    <section class="grid">
      <section class="panel">
        <div class="panel-title-row">
          <h2>API Health</h2>
          <span id="healthBadge" class="badge badge-muted">not checked</span>
        </div>
        <button id="healthButton">Check API</button>

        <div class="status-grid">
          <div class="status-card">
            <span class="label">Status</span>
            <strong id="healthStatus">Unknown</strong>
          </div>
          <div class="status-card">
            <span class="label">Provider</span>
            <strong id="healthProvider">Unknown</strong>
          </div>
          <div class="status-card">
            <span class="label">Adapter</span>
            <strong id="healthAdapter">Unknown</strong>
          </div>
        </div>

        <p id="healthMessage" class="message">API health has not been checked yet.</p>
      </section>

      <section class="panel">
        <h2>Chat</h2>
        <div class="chat-row">
          <input id="chatInput" type="text" value="Hei Lucifer" aria-label="Chat text">
          <button id="chatButton">Send</button>
        </div>

        <article class="response-card">
          <span class="label">Voice summary</span>
          <p id="voiceOutput">No message sent yet.</p>
        </article>

        <article class="response-card">
          <span class="label">Visual response</span>
          <p id="visualOutput">No message sent yet.</p>
        </article>

        <p id="traceOutput" class="trace">trace_id: none</p>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
